name: Publish update site to GitHub Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-pages-content:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Build Pages content from latest release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          rm -rf release-assets extracted public
          mkdir -p release-assets public/updates

          releases_json="$(gh api "repos/${REPOSITORY}/releases?per_page=30")"

          echo "${releases_json}" | jq -r '
            map(select(.draft == false and .prerelease == false))
            | sort_by(.published_at)
            | reverse
            | .[:5]
            | .[].tag_name
          ' | while read -r tag_name; do
            version="${tag_name#v}"

            if ! echo "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Skipping tag '${tag_name}' because it is not an x.y.z version."
              continue
            fi

            echo "Processing ${tag_name} as updates/${version}"

            rm -rf release-assets extracted
            mkdir -p release-assets extracted "public/updates/${version}"

            gh release download "${tag_name}" \
              --repo "${REPOSITORY}" \
              --pattern "enhanced-class-decompiler-*.zip" \
              --dir release-assets

            zip_path="$(find release-assets -maxdepth 1 -type f -name 'enhanced-class-decompiler-*.zip' | sort | head -n 1 || true)"
            if [ -z "${zip_path}" ]; then
              echo "Skipping release ${tag_name} because no enhanced-class-decompiler-*.zip asset was found."
              rm -rf "public/updates/${version}"
              continue
            fi

            unzip -q "${zip_path}" -d extracted

            if [ ! -d extracted/features ] || [ ! -d extracted/plugins ]; then
              echo "Expected extracted/features/ and extracted/plugins/ at zip root."
              exit 1
            fi
            if [ ! -f extracted/content.jar ] && [ ! -f extracted/content.xml ] && [ ! -f extracted/content.xml.xz ]; then
              echo "Expected p2 content metadata at zip root."
              unzip -Z1 "${zip_path}" | head -n 200
              exit 1
            fi
            if [ ! -f extracted/artifacts.jar ] && [ ! -f extracted/artifacts.xml ] && [ ! -f extracted/artifacts.xml.xz ]; then
              echo "Expected p2 artifact metadata at zip root."
              unzip -Z1 "${zip_path}" | head -n 200
              exit 1
            fi

            rsync -a --delete extracted/ "public/updates/${version}/"

            if [ ! -d public/updates/latest ]; then
              mkdir -p public/updates/latest
              rsync -a --delete extracted/ public/updates/latest/
            fi
          done

          if [ ! -d public/updates/latest ]; then
            echo "No valid release asset was processed, so public/updates/latest was not created."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build-pages-content
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
