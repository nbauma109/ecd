name: Update JitPack Download Links

on:
  push:
    branches:
      - master

jobs:
  update-download-links:
    if: startsWith(github.event.head_commit.message, '[update version]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine latest release version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update download links
        run: |
          VERSION=${{ steps.version.outputs.version }}

          update_file() {
            FILE="$1"
            sed -E -i \
              "s#[0-9]+\.[0-9]+\.[0-9]+#${VERSION}#g" \
              "$FILE"
          }

          update_file README.md

      - name: Commit and push changes
        run: |
          VERSION=${{ steps.version.outputs.version }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Update jitpack download links for new release ${VERSION}"
          git push
